<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restricted Access</title>
    <!-- Importing a "robotic" font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron&display=swap" rel="stylesheet">
    
    <style>
        /* This style makes the password overlay look robotic */
        #password-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            color: #0f0; /* Matrix green color */
            font-family: 'Orbitron', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        #password-overlay input {
            background: #222;
            border: 2px solid #0f0;
            color: #0f0;
            padding: 10px;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            margin-top: 20px;
        }

        /* This hides your actual content until login */
        #main-content {
            display: none; 
        }
    </style>
</head>
<body>

    <!-- The Password Screen -->
    <div id="password-overlay">
        <h2>ACCESS DENIED</h2>
        <p>ENTER PASSWORD TO ENTER</p>
        <input type="password" id="passInput" placeholder=">_">
        <button onclick="checkPassword()" style="margin-top:10px; background:#0f0; cursor:pointer;">SUBMIT</button>
    </div>

    <!-- Your actual website content goes inside this div -->
    <div id="main-content">
        <h1>Welcome to the secure zone.</h1>
        <p>This is where your real website content goes!</p>
    </div>

    <script>
        const correctPassword = "your-secret-password-here"; // CHANGE THIS

        function checkPassword() {
            const input = document.getElementById('passInput').value;
            if (input === correctPassword) {
                document.getElementById('password-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else {
                alert("ACCESS DENIED");
                document.getElementById('passInput').value = ""; // Clear input
            }
        }
    </script>
</body>
</html>
